<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EximHub Discovery Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
        }

        nav {
            padding: 20px 5%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 20px; font-weight: 700; color: var(--primary); }
        .points { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; }

        main { flex: 1; padding: 40px 5%; max-width: 1200px; margin: 0 auto; width: 100%; }

        .search {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .input-box { flex: 1; min-width: 200px; }
        .input-box label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
        .input-box input { width: 100%; background: #0f172a; border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: white; }

        .btn-search { background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 8px; cursor: pointer; font-weight: 600; align-self: flex-end; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-4px); border-color: var(--primary); }
        
        .badge { background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; width: fit-content; margin-bottom: 12px; }

        .reveal-box { background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .masked { color: var(--text-dim); font-family: monospace; letter-spacing: 3px; margin-bottom: 12px; }
        
        .btn-reveal {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-reveal.active { background: var(--accent); border-color: var(--accent); color: white; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">EximHub</div>
        <div class="points" id="pts">100 Points</div>
    </nav>

    <main>
        <div style="text-align: center; margin-bottom: 40px;">
            <h2 style="font-size: 32px; margin-bottom: 8px;">EximHub Discovery Preview</h2>
            <p style="color: var(--text-dim);">Find procurement leads across 195 countries.</p>
        </div>

        <div class="search">
            <div class="input-box">
                <label>Industry</label>
                <input type="text" value="Textiles">
            </div>
            <div class="input-box">
                <label>Country</label>
                <input type="text" value="India">
            </div>
            <button class="btn-search">Search Buyers</button>
        </div>

        <div class="grid">
            <div class="card">
                <div class="badge">94 Discovery Score</div>
                <h3 style="margin-bottom: 12px;">Zenith Textiles Ltd</h3>
                <p style="font-size: 14px; color: var(--text-dim); margin-bottom: 15px;">📍 Mumbai, India</p>
                
                <div style="font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 8px;">👔 Procurement Manager</div>
                <div class="reveal-box" id="r1">
                    <div class="masked" id="m1">•••••••••••</div>
                    <button class="btn-reveal" onclick="rv(1, 'Amit Sharma', '+91 98XXX XXXXX')">Reveal (1 Point)</button>
                </div>
            </div>

            <div class="card">
                <div class="badge">88 Discovery Score</div>
                <h3 style="margin-bottom: 12px;">Nordic Global Trade</h3>
                <p style="font-size: 14px; color: var(--text-dim); margin-bottom: 15px;">📍 Stockholm, Sweden</p>
                
                <div style="font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 8px;">👔 Sourcing Lead</div>
                <div class="reveal-box" id="r2">
                    <div class="masked" id="m2">•••••••••••</div>
                    <button class="btn-reveal" onclick="rv(2, 'Erik Nilsson', '+46 70XXX XXXX')">Reveal (1 Point)</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let p = 100;
        function rv(id, n, ph) {
            if (p <= 0) return alert("No points!");
            const btn = document.querySelector('#r'+id+' .btn-reveal');
            if (btn.classList.contains('active')) return;
            p--;
            document.getElementById('pts').innerText = p + ' Points';
            document.getElementById('m'+id).innerHTML = `<b>${n}</b><br>${ph}`;
            document.getElementById('m'+id).style.letterSpacing = '0';
            btn.innerText = '✓ Revealed';
            btn.classList.add('active');
        }
    </script>
</body>
</html>
